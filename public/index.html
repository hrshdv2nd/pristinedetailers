<!DOCTYPE html>
<html lang="en">
<head>

  <title>Pristine Detailers — Melbourne's Premium Mobile Detailing</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Mobile ceramic coating, paint protection film, and obsessive-grade detailing — brought to your driveway in Melbourne." />
  
  <!-- Custom fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  
  <style>

    html, body {
      margin: 0;
      padding: 0;
      background: #F4F4F2;
      color: #0A0A0A;
      font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    h1, h2, h3, h4, h5 {
      font-family: 'Bricolage Grotesque', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.02;
      margin: 0;
    }

    p { margin: 0; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; padding: 0; color: inherit; }

    @keyframes pd-marquee {
      from { transform: translateX(0); }
      to { transform: translateX(-33.33%); }
    }

</head>
