# Supabase local development config
# Run: supabase start  (requires Docker)
# Docs: https://supabase.com/docs/guides/cli/config

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323

[inbucket]
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# Magic link — primary auth method for Pristine customers
[auth.email.template.magic_link]
subject = "Your Pristine Detailers sign-in link"

[functions.sync-setmore]
verify_jwt = true

[functions.setmore-webhook]
verify_jwt = false    # Setmore calls this without a JWT

[functions.stripe-webhook]
verify_jwt = false    # Stripe calls this without a JWT
